name: Build KLauncher

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Qt6 and dependencies ─────────────────────────────
      - name: Install Qt6 and build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-webengine-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libqt6webenginewidgets6 \
            libqt6webchannel6-dev \
            libqt6svg6-dev \
            libqt6sql6-sqlite \
            cmake \
            ninja-build \
            g++ \
            pkg-config \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcb-xinerama0-dev \
            libxcb-cursor-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype-dev \
            unzip \
            patchelf \
            wget

      # ── Configure ────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -G Ninja

      # ── Build ────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel $(nproc)

      # ── Package with linuxdeploy + AppImage ──────────────────────
      - name: Download linuxdeploy
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -O linuxdeploy
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage" -O linuxdeploy-plugin-qt
          chmod +x linuxdeploy linuxdeploy-plugin-qt

      - name: Install into AppDir
        run: |
          DESTDIR=AppDir cmake --install build
          # Ensure binary has correct name
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp resources/icons/klauncher.png AppDir/usr/share/icons/hicolor/256x256/apps/klauncher.png
          cp scripts/klauncher.desktop AppDir/usr/share/applications/klauncher.desktop

      - name: Bundle AppImage
        env:
          QMAKE: /usr/lib/qt6/bin/qmake6
          QT_PLUGIN_PATH: /usr/lib/x86_64-linux-gnu/qt6/plugins
        run: |
          ./linuxdeploy \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --executable AppDir/usr/bin/KLauncher \
            --desktop-file AppDir/usr/share/applications/klauncher.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/klauncher.png
          # Rename to versioned name
          VERSION="${GITHUB_REF_NAME:-dev}"
          mv KLauncher*.AppImage KLauncher-${VERSION}-x86_64.AppImage

      # ── Also build a plain static binary tarball ─────────────────
      - name: Package binary tarball
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p release/KLauncher-${VERSION}-linux-x86_64
          cp build/KLauncher release/KLauncher-${VERSION}-linux-x86_64/KLauncher
          cp scripts/klauncher.desktop release/KLauncher-${VERSION}-linux-x86_64/
          cp README.md release/KLauncher-${VERSION}-linux-x86_64/ 2>/dev/null || true
          tar -czf KLauncher-${VERSION}-linux-x86_64.tar.gz \
            -C release KLauncher-${VERSION}-linux-x86_64

      # ── Upload artifacts (for non-tag builds) ────────────────────
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: KLauncher-AppImage
          path: KLauncher-*.AppImage

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: KLauncher-tarball
          path: KLauncher-*.tar.gz

      # ── Create GitHub Release (only on version tags) ─────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: KLauncher ${{ github.ref_name }}
          body: |
            ## KLauncher ${{ github.ref_name }}

            ### Downloads
            - **AppImage** (recommended): self-contained, no install needed — just `chmod +x` and run
            - **Tarball**: raw binary + desktop file

            ### Requirements
            - Linux x86_64
            - glibc 2.31+ (Ubuntu 20.04+, Arch, Fedora 33+, etc.)

            ### First launch
            1. Download the AppImage
            2. `chmod +x KLauncher-*.AppImage`
            3. `./KLauncher-*.AppImage`

            No Java needed to be pre-installed — KLauncher will offer to download it for you.
          files: |
            KLauncher-*.AppImage
            KLauncher-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
